<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de Clique</title>
    <link rel="shortcut icon" href="assets/presente.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css"/>
    <link rel="stylesheet" href="./css/reator.css"/>
    <link rel="stylesheet" href="./css/loja.css"/>
    <link rel="stylesheet" href="presenteFlutuante/style.css"/>
  </head>
  <body>
    <h1>NuclearCLiquer!PORRA</h1>

    <div class="layout">
      <div id="status">
        <p>Pontuação: <span class="valor-pontuacao">0</span></p>
        <p>PODER DE CLIQUE: <span id="valorclique">1</span></p>
        <p>Upgrades comprados: <span id="upgrades">0</span></p>
        <p>Energia por segundo: <span id="valorPorSegundo">0</span></p>
      </div>

      <div class="reator-borda">
        <button class="reator" id="botaoClique">
          <p>REATOR NODE</p>
          <span class="valor-pontuacao">0</span>
        </button>
      </div>

      <div id="loja">
        <button id="btnUranio">
          Haste de Urânio (+1/clique) <br />
          Custo: <span id="custoUranio">10</span>
        </button>

        <button id="btnSupercondutor">
          Fiação Supercondutor (+2/seg) <br />
          Custo: <span id="custoSupercondutor">50</span>
        </button>

        <button id="btnLaser">
          Calibração de Foco do Laser (+10/seg) <br />
          Custo: <span id="custoLaser">500</span>
        </button>

        <button id="btnResfriamento">
          Resfriamento Heavy Water (+30/seg)<br />
          Custo: <span id="custoResfriamento">5000</span>
        </button>

        <button id="btnBobina">
          Bobinas De Contenção (+100/seg)<br />
          Custo: <span id="custoBobina">45000</span>
        </button>

        <button id="btnCriogenico">
          Resfriamento Criogênico (+500/seg)<br />
          Custo: <span id="custoCriogenico">250000</span>
        </button>

        <button id="btnProcessador">
          Processador de Grafeno (+1000/seg)<br />
          Custo: <span id="custoProcessador">1600000</span>
        </button>

        <button id="btnInjetor">
          Injetor de Antimatéria (+500/clique)<br />
          Custo: <span id="custoInjetor">15600000</span>
        </button>

        <button id="btnQuantico">
          Algoritmo Quântico de Fusão (+10000/seg)<br />
          Custo: <span id="custoQuantico">1460000000</span>
        </button>
      </div>
    </div>

    <p id="mensagem"></p>
    <div id="indicadorBuff"></div>

    <script src="./js/script.js"></script>
    <script src="./js/upgrades.js"></script>
    <script src="presenteFlutuante/presente.js"></script>
  </body>
</html>
